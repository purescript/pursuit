
# For caching, see below. A request is served from the page cache when a file
# named for the Accept header's mapped suffix exists. Browsers send composite
# Accept strings ("text/html,application/xhtml+xml,...;q=0.9") that match
# none of the exact entries, so without a default they would miss the cache
# and have the backend re-render every page view; default to html so that
# ordinary page views are cache hits. Clients wanting a non-HTML
# representation of a cached page must send that exact Accept value, as
# before.
map $http_accept $file_suffix {
    default          html;
    text/html        html;
    application/json json;
    text/svg         svg;
    text/plain       txt;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    location /.well-known {
        root /var/www/letsencrypt-webroot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    server_name pursuit.purescript.org;

    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    # Some package resolutions (web-html, halogen, etc.) exceed the 1m default
    # size set by nginx, so we expand that limit.
    # https://nginx.org/en/docs/http/ngx_http_core_module.html#client_max_body_size
    client_max_body_size 10m;

    # SSL configuration
    # based on https://ssl-config.mozilla.org/
    ssl_certificate         /etc/letsencrypt/live/pursuit.purescript.org/fullchain.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/pursuit.purescript.org/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/pursuit.purescript.org/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:ssl:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_dhparam /etc/nginx/ssl_dhparam;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    # Maybe enable this later
    # Low max-age to start with, just in case
    # add_header Strict-Transport-Security "max-age=60" always;

    # Pursuit-specific configuration
    add_header Content-Security-Policy
        "default-src 'none'; script-src 'self' *.google-analytics.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com; img-src *; connect-src 'self'; manifest-src 'self'; plugin-types 'none'; base-uri 'none'" always;

    location / {
        # this is really gross. sorry
        # it's here because nginx will return 405 Not Allowed by default
        # if you try to access a static file using the POST method, and
        # we need to be able to do `POST /packages`. HEAD is served like GET
        # (from the cache when possible): Yesod runs the full GET handler for
        # HEAD requests, so sending them straight to the backend would make
        # them as expensive as a render while looking free.
        error_page 418 = @backend;
        recursive_error_pages on;

        if ($request_method !~ ^(GET|HEAD)$) {
            return 418;
        }

        root /var/www/pursuit/data/cache;

        try_files $uri/index.$file_suffix @backend;
    }

    # Uncached package pages are the expensive routes - rendering one decodes
    # the package's whole docs JSON - and scraper fleets with spoofed browser
    # user agents crawl them hard enough to take the backend down, so their
    # cache misses detour through Anubis (a challenge proxy; see SERVER.md)
    # on the way to the backend. Cache hits are still served directly, and
    # every other route - including `POST /packages` uploads (which match
    # `location /`, not this prefix), /search, and the /search uptime check -
    # bypasses Anubis entirely, so tooling and monitoring see the backend
    # itself. HEAD must take the same path as GET: Yesod runs the full GET
    # handler for HEAD requests, so letting HEAD skip Anubis would give
    # scrapers a full-cost decode for free. All routes under /packages/ are
    # GET-only, but other methods keep the same escape hatch as `location /`
    # just in case.
    location /packages/ {
        error_page 418 = @backend;
        recursive_error_pages on;

        if ($request_method !~ ^(GET|HEAD)$) {
            return 418;
        }

        root /var/www/pursuit/data/cache;

        try_files $uri/index.$file_suffix @anubis;
    }

    # Anubis serves its challenge pages' scripts and check-in endpoints under
    # this prefix.
    location /.within.website/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:8923;
    }

    location @anubis {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:8923;
    }

    location @backend {
        proxy_pass http://127.0.0.1:3000;
    }
}

